<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Pedido - Express Kitchen</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <header class="bg-red-600 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex items-center gap-4">
            <a href="/" class="text-xl font-bold hover:text-gray-200">← Volver</a>
            <h1 class="text-lg font-black uppercase tracking-wider">Datos de Entrega</h1>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6 max-w-xl">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 mb-6">
            <h2 class="font-black text-gray-800 uppercase text-sm tracking-wider mb-3">Resumen de tu cuenta</h2>
            <div id="checkout-summary" class="space-y-2 text-sm text-gray-600">
            </div>
            
            <div class="border-t pt-3 mt-3 space-y-2 text-sm text-gray-600">
                <div class="flex justify-between">
                    <span>Subtotal Productos:</span>
                    <span id="checkout-subtotal" class="font-semibold text-gray-800">$0</span>
                </div>
                <div id="fila-envio" class="flex justify-between text-amber-600 font-medium">
                    <span>🛵 Recargo Envío:</span>
                    <span id="checkout-envio">+$3,000</span>
                </div>
            </div>

            <div class="flex justify-between items-center pt-3 border-t mt-2">
                <span class="font-bold text-gray-700">Total Neto a Pagar:</span>
                <span id="checkout-total" class="text-xl font-black text-green-600">$0</span>
            </div>
        </div>

        <form id="order-form" onsubmit="enviarPedido(event)" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 space-y-4">
            <h2 class="font-black text-gray-800 uppercase text-sm tracking-wider mb-2">¿Cómo deseas recibir tu comida?</h2>
            
            <div class="mb-4">
                <div class="grid grid-cols-2 gap-2 bg-gray-100 p-1 rounded-xl">
                    <button type="button" id="btn-entrega-domicilio" onclick="cambiarMetodoEntrega('domicilio')" class="py-2.5 text-sm font-bold rounded-lg transition-all duration-200 bg-white text-red-600 shadow-sm">
                        🏍️ Domicilio
                    </button>
                    <button type="button" id="btn-entrega-local" onclick="cambiarMetodoEntrega('local')" class="py-2.5 text-sm font-bold rounded-lg transition-all duration-200 text-gray-600 hover:text-gray-900">
                        🏃‍♂️ Retiro en Local
                    </button>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Nombre Completo</label>
                <input type="text" id="nombre" required class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 transition">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Teléfono / WhatsApp</label>
                <input type="tel" id="telefono" required placeholder="Ej: 3123456789" class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 transition">
            </div>

            <div id="contenedor-logistica">
                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Dirección de Domicilio</label>
                <input type="text" id="direccion" required placeholder="Barrio, Calle, Número de casa o apartamento" class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 transition">
                
                <button type="button" onclick="obtenerUbicacion()" id="btn-gps" class="mt-2 text-xs font-bold text-red-600 hover:text-red-700 flex items-center gap-1 transition bg-red-50 hover:bg-red-100 px-3 py-2 rounded-lg border border-red-200">
                    📍 Compartir mi ubicación GPS actual
                </button>
                
                <input type="hidden" id="coordenadas" name="coordenadas">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Notas adicionales (Opcional)</label>
                <textarea id="notas" rows="2" placeholder="Ej: Cambiar por billete de 50, sin cebolla, traer datafono..." class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 transition"></textarea>
            </div>

            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-4 rounded-xl transition shadow uppercase tracking-wider text-xs mt-2">
                🚀 Enviar Pedido a la Cocina
            </button>
        </form>
    </main>

    <script src="{{ url_for('static', filename='js/cart.js') }}"></script>
    
    <script>
        // Variables globales de control financiero
        let subtotalProductos = 0;
        let metodoEntrega = 'domicilio';
        const TARIFA_DOMICILIO = 5000;

        document.addEventListener('DOMContentLoaded', () => {
            const summaryContainer = document.getElementById('checkout-summary');
            
            if (!carrito || carrito.length === 0) {
                window.location.href = '/';
                return;
            }

            summaryContainer.innerHTML = '';
            subtotalProductos = 0;
            
            carrito.forEach(item => {
                const subtotalItem = item.precio * item.cantidad;
                subtotalProductos += subtotalItem;
                summaryContainer.innerHTML += `
                    <div class="flex justify-between">
                        <span>${item.nombre} <b class="text-red-600">x${item.cantidad}</b></span>
                        <span class="font-semibold text-gray-800">$${subtotalItem.toLocaleString('es-CO')}</span>
                    </div>
                `;
            });
            
            // Render inicial de precios
            calcularTotalesFinales();
        });

        // FUNCIÓN CLAVE: Alterna los campos y recalcula de forma transparente
        function cambiarMetodoEntrega(metodo) {
            metodoEntrega = metodo;
            
            const btnDomicilio = document.getElementById('btn-entrega-domicilio');
            const btnLocal = document.getElementById('btn-entrega-local');
            const contenedorLogistica = document.getElementById('contenedor-logistica');
            const inputDireccion = document.getElementById('direccion');
            const filaEnvio = document.getElementById('fila-envio');

            if (metodo === 'domicilio') {
                btnDomicilio.className = "py-2.5 text-sm font-bold rounded-lg transition-all duration-200 bg-white text-red-600 shadow-sm";
                btnLocal.className = "py-2.5 text-sm font-bold rounded-lg transition-all duration-200 text-gray-600 hover:text-gray-900";
                
                // Mostrar bloque logístico y volverlo requerido obligatorio
                contenedorLogistica.classList.remove('hidden');
                inputDireccion.required = true;
                filaEnvio.classList.remove('hidden');
            } else {
                btnLocal.className = "py-2.5 text-sm font-bold rounded-lg transition-all duration-200 bg-white text-red-600 shadow-sm";
                btnDomicilio.className = "py-2.5 text-sm font-bold rounded-lg transition-all duration-200 text-gray-600 hover:text-gray-900";
                
                // Ocultar bloque y remover obligatoriedad para pasar el formulario limpio
                contenedorLogistica.classList.add('hidden');
                inputDireccion.required = false;
                inputDireccion.value = "";
                document.getElementById('coordenadas').value = "";
                filaEnvio.classList.add('hidden');
            }

            calcularTotalesFinales();
        }

        function calcularTotalesFinales() {
            let costoEnvio = 0;
            
            if (metodoEntrega === 'domicilio') {
                const horaActual = new Date().getHours(); // Captura la hora local del dispositivo del cliente
                // Si la hora del dispositivo está entre las 8 PM (20) y las 11 PM (23)
                if (horaActual >= 20 && horaActual < 23) {
                    costoEnvio = 6000;
                    document.getElementById('checkout-envio').innerText = `+$${costoEnvio.toLocaleString('es-CO')} (Nocturno)`;
                } else {
                    costoEnvio = TARIFA_DOMICILIO; // Los $5000 normales
                    document.getElementById('checkout-envio').innerText = `+$${costoEnvio.toLocaleString('es-CO')}`;
                }
            }

            let totalNeto = subtotalProductos + costoEnvio;

            document.getElementById('checkout-subtotal').innerText = `$${subtotalProductos.toLocaleString('es-CO')}`;
            document.getElementById('checkout-total').innerText = `$${totalNeto.toLocaleString('es-CO')}`;
        }

        // Función para capturar coordenadas GPS
        function obtenerUbicacion() {
            const btnGps = document.getElementById('btn-gps');

            if (!navigator.geolocation) {
                alert("Lo siento, tu navegador no soporta geolocalización.");
                return;
            }

            btnGps.innerText = "⏳ Obteniendo ubicación...";
            btnGps.disabled = true;

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    // Almacenamiento limpio del enlace de Google Maps
                    document.getElementById('coordenadas').value = `https://maps.google.com/?q=${lat},${lon}`;
                    
                    btnGps.innerText = "✅ Ubicación vinculada con éxito";
                    btnGps.className = "mt-2 text-xs font-bold text-green-600 flex items-center gap-1 bg-green-50 px-3 py-2 rounded-lg border border-green-200";
                },
                (error) => {
                    console.error(error);
                    btnGps.innerText = "❌ Error al obtener ubicación";
                    btnGps.disabled = false;
                    alert("No se pudo obtener la ubicación exacta. Escribe tu dirección manualmente.");
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        // Función unificada de Envío hacia el backend Flask
        function enviarPedido(event) {
            event.preventDefault();
            
            // 1. Calculamos el total neto dinámico según la hora local del cliente
            let costoEnvio = 0;
            if (metodoEntrega === 'domicilio') {
                const horaActual = new Date().getHours();
                costoEnvio = (horaActual >= 20 && horaActual < 23) ? 6000 : TARIFA_DOMICILIO;
            }
            let totalNetoDefinitivo = subtotalProductos + costoEnvio;
            
            // 2. Creamos el objeto con las llaves exactas que espera tu archivo app.py
            const datos = {
                nombre: document.getElementById('nombre').value,
                telefono: document.getElementById('telefono').value,
                metodo_entrega: metodoEntrega,
                direccion: metodoEntrega === 'domicilio' ? document.getElementById('direccion').value : "Retiro en local",
                ubicacion_gps: metodoEntrega === 'domicilio' ? (document.getElementById('coordenadas').value || "No compartida") : "N/A",
                notas: document.getElementById('notas').value,
                total: totalNetoDefinitivo,
                carrito: carrito 
            };
            
            // Deshabilitar botón para evitar múltiples clics
            const btnEnviar = event.target.querySelector('button[type="submit"]');
            btnEnviar.innerText = "⏳ Enviando pedido a la cocina...";
            btnEnviar.disabled = true;

            // 3. Enviamos los datos al backend
            fetch('/api/enviar-pedido', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(datos)
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success' || data.success === true) {
                    // ¡Éxito! Limpiamos el almacenamiento local del carrito
                    localStorage.removeItem('carrito');
                    if (typeof carrito !== 'undefined') carrito = []; 
                    
                    // REDIRECCIÓN AUTOMÁTICA EN TIEMPO REAL A LA INTERFAZ DE GUÍA
                    window.location.href = `/seguimiento/${data.pedido_id}`;
                } else {
                    alert("Hubo un problema al procesar el pedido: " + (data.message || "Error desconocido"));
                    btnEnviar.innerText = "🚀 Enviar Pedido a la Cocina";
                    btnEnviar.disabled = false;
                }
            })
            .catch(error => {
                console.error("Error en Fetch:", error);
                alert("Error de conexión con el servidor.");
                btnEnviar.innerText = "🚀 Enviar Pedido a la Cocina";
                btnEnviar.disabled = false;
            });
        }
    </script>
</body>
</html>
